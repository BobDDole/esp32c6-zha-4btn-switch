name: Build ESP32‑C6 Zigbee 4BTN Switch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout your project
    - name: Checkout project
      uses: actions/checkout@v4

    # 2. Clone ESP-Zigbee fork (required for esp_zigbee_core.h)
    - name: Clone ESP-Zigbee fork
      run: |
        git clone --branch main https://github.com/espressif/esp-zigbee-sdk.git esp-zigbee-sdk

    # 3. Upgrade pip, setuptools, wheel
    - name: Setup Python
      run: |
        python3 -m pip install --upgrade pip setuptools wheel

    # 4. Build firmware using ESP-Zigbee fork
    - name: Build firmware
      run: |
        export IDF_PATH=$PWD/esp-zigbee-sdk
        python3 -m pip install -r $IDF_PATH/requirements.txt
        idf.py set-target esp32c6
        idf.py fullclean
        idf.py build

    # 5. Upload bootloader
    - name: Upload bootloader
      uses: actions/upload-artifact@v4
      with:
        name: bootloader
        path: build/bootloader/bootloader.bin

    # 6. Upload partition table
    - name: Upload partition table
      uses: actions/upload-artifact@v4
      with:
        name: partition-table
        path: build/partition_table/partition-table.bin

    # 7. Upload main firmware
    - name: Upload main firmware
      uses: actions/upload-artifact@v4
      with:
        name: zigbee_4btn_switch
        path: build/zigbee_4btn_switch.bin
