name: Build ESP32‑C6 Zigbee 4BTN Switch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout project
      - uses: actions/checkout@v4

      # Clone full ESP-IDF release v5.3.2
      - name: Clone ESP-IDF
        uses: actions/checkout@v4
        with:
          repository: espressif/esp-idf
          ref: v5.3.2
          path: esp-idf

      # Install Python dependencies
      - name: Install Python packages
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install -r esp-idf/requirements.txt

      # Build firmware for ESP32-C6
      - name: Build firmware
        run: |
          export IDF_PATH=$PWD/esp-idf
          idf.py set-target esp32c6
          idf.py fullclean
          idf.py build

      # Upload bootloader.bin
      - name: Upload bootloader
        uses: actions/upload-artifact@v4
        with:
          name: bootloader
          path: build/bootloader/bootloader.bin

      # Upload partition-table.bin
      - name: Upload partition table
        uses: actions/upload-artifact@v4
        with:
          name: partition-table
          path: build/partition_table/partition-table.bin

      # Upload main firmware
      - name: Upload main firmware
        uses: actions/upload-artifact@v4
        with:
          name: zigbee_4btn_switch
          path: build/zigbee_4btn_switch.bin
