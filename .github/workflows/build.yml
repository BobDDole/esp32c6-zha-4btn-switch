name: Build ESP32‑C6 ZHA 4BTN Switch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build with ESP‑IDF CI Action
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.3
          target: esp32c6
          path: .

      - name: Upload bootloader
        uses: actions/upload-artifact@v4
        with:
          name: bootloader
          path: build/bootloader/bootloader.bin

      - name: Upload partition table
        uses: actions/upload-artifact@v4
        with:
          name: partition-table
          path: build/partition_table/partition-table.bin

      - name: Upload main firmware
        uses: actions/upload-artifact@v4
        with:
          name: zigbee_4btn_switch
          path: build/zigbee_4btn_switch.bin
