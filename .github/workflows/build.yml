name: Build ESP32‑C6 Zigbee 4BTN Switch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout project
      uses: actions/checkout@v4

    - name: Install ESP‑IDF
      run: |
        sudo apt update
        sudo apt install -y git wget python3 python3-pip python3-venv
        wget https://dl.espressif.com/dl/esp-idf/releases/esp-idf-v5.3.2-linux-x86_64.tar.gz
        tar -xzf esp-idf-v5.3.2-linux-x86_64.tar.gz
        mv esp-idf v5.3.2
        cd v5.3.2
        ./install.sh

    - name: Setup environment
      run: |
        source $GITHUB_WORKSPACE/v5.3.2/export.sh

    - name: Ensure Python deps
      run: |
        python3 -m pip install --upgrade pip setuptools wheel

    - name: Build firmware
      run: |
        source $GITHUB_WORKSPACE/v5.3.2/export.sh
        idf.py set-target esp32c6
        idf.py fullclean
        idf.py build

    - name: Upload bootloader
      uses: actions/upload-artifact@v4
      with:
        name: bootloader
        path: build/bootloader/bootloader.bin

    - name: Upload partition table
      uses: actions/upload-artifact@v4
      with:
        name: partition-table
        path: build/partition_table/partition-table.bin

    - name: Upload main firmware
      uses: actions/upload-artifact@v4
      with:
        name: zigbee_4btn_switch
        path: build/zigbee_4btn_switch.bin
