name: Build ESP32‑C6 ZHA 4BTN Switch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ESP‑IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: "v5.1"

      # FIX: Ensure pip, setuptools, wheel are installed in ESP-IDF venv
      - name: Install Python packages
        run: |
          source $HOME/.espressif/python_env/idf5.1_py3.11_venv/bin/activate
          python -m ensurepip --upgrade
          python -m pip install --upgrade pip setuptools wheel

      - name: Build firmware
        run: |
          source $HOME/.espressif/python_env/idf5.1_py3.11_venv/bin/activate
          idf.py set-target esp32c6
          idf.py fullclean
          idf.py build

      - name: Upload bootloader
        uses: actions/upload-artifact@v4
        with:
          name: bootloader
          path: build/bootloader/bootloader.bin

      - name: Upload partition table
        uses: actions/upload-artifact@v4
        with:
          name: partition-table
          path: build/partition_table/partition-table.bin

      - name: Upload main firmware
        uses: actions/upload-artifact@v4
        with:
          name: zigbee_4btn_switch
          path: build/zigbee_4btn_switch.bin
