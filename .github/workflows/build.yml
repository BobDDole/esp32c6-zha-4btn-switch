name: Build ESP32-C6 Zigbee 4BTN Switch

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.3

    steps:
      - uses: actions/checkout@v4

      - name: Build Firmware
        shell: bash
        run: |
          source /opt/esp/idf/export.sh
          idf.py set-target esp32c6
          idf.py build

      - name: Upload bootloader
        uses: actions/upload-artifact@v4
        with:
          name: bootloader
          path: build/bootloader/bootloader.bin

      - name: Upload partition table
        uses: actions/upload-artifact@v4
        with:
          name: partition-table
          path: build/partition_table/partition-table.bin

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: zigbee_4btn_switch
          path: build/zigbee_4btn_switch.bin
